<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="watercolor" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" />
      <feGaussianBlur stdDeviation="1" />
    </filter>
  </defs>
  <g filter="url(#watercolor)" opacity="0.9">
    <!-- Leaves -->
    <path d="M20,20 Q40,5 60,30 T100,20" stroke="#8FBC8F" stroke-width="2" fill="none"/>
    <path d="M20,20 Q5,40 30,60 T20,100" stroke="#8FBC8F" stroke-width="2" fill="none"/>
    <ellipse cx="60" cy="30" rx="10" ry="5" fill="#8FBC8F" transform="rotate(-15 60 30)" opacity="0.6"/>
    <ellipse cx="30" cy="60" rx="5" ry="10" fill="#8FBC8F" transform="rotate(15 30 60)" opacity="0.6"/>
    
    <!-- Flowers -->
    <circle cx="40" cy="40" r="15" fill="#FFB7C5" opacity="0.8"/>
    <circle cx="35" cy="35" r="12" fill="#FFC0CB" opacity="0.9"/>
    <circle cx="45" cy="45" r="10" fill="#FF69B4" opacity="0.4"/>
    
    <circle cx="80" cy="25" r="8" fill="#FFB7C5" opacity="0.7"/>
    <circle cx="25" cy="80" r="8" fill="#FFB7C5" opacity="0.7"/>
  </g>
</svg>
