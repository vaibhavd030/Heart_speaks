<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <filter id="parchment">
    <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise"/>
    <feDiffuseLighting in="noise" lighting-color="#fdfbf7" surfaceScale="2">
      <feDistantLight azimuth="45" elevation="60"/>
    </feDiffuseLighting>
    <feColorMatrix type="matrix" values="0 0 0 0 .9
                                       0 0 0 0 .88
                                       0 0 0 0 .8
                                       0 0 0 1 0"/>
  </filter>
  <rect width="100%" height="100%" fill="#FFFDD0" filter="url(#parchment)"/>
  <rect width="100%" height="100%" fill="#FFFDD0" opacity="0.5"/>
</svg>
