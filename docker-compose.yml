version: '3.8'

services:
  heart-speaks:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db
      - ./logs:/app/logs
    env_file:
      - .env
    restart: unless-stopped
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - LOG_LEVEL=INFO
